<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mateo Young — Portfolio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Inter:wght@400;500&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #000000;
    --panel: #080808;
    --line: #2a2a2a;
    --text: #e6e6e6;
    --muted: #767676;
    --gold: #ff9f1c;
    --cyan: #5ad8d8;
    --up: #00e676;
    --down: #ff3b30;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    min-width: 1100px;
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
  }

  body {
    display: flex;
    flex-direction: column;
  }

  main {
    flex: 1;
    display: flex;
    min-height: 0;
  }

  /* ---------- Sidebar ---------- */
  .sidebar {
    width: 240px;
    flex-shrink: 0;
    padding: 56px 32px;
    border-right: 1px solid var(--line);
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }

  .name {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: 2.6rem;
    line-height: 1.05;
    letter-spacing: -0.01em;
  }

  .role {
    margin-top: 14px;
    color: var(--gold);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.78rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .rule {
    width: 40px;
    height: 2px;
    background: var(--gold);
    margin: 28px 0;
  }

  .photo-spot {
    width: 126px;
    height: 126px;
    border-radius: 50%;
    border: 1px dashed var(--line);
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 32px auto;
    color: var(--muted);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.06em;
    text-align: center;
    overflow: hidden;
  }

  .photo-spot img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .block-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
  }

  .education {
    margin-bottom: 36px;
  }

  .education .school {
    font-weight: 500;
    font-size: 0.98rem;
  }

  .education .degree {
    color: var(--muted);
    font-size: 0.9rem;
    margin-top: 4px;
    line-height: 1.5;
  }

  .contact a {
    display: block;
    color: var(--text);
    text-decoration: none;
    font-size: 0.78rem;
    line-height: 1.5;
    padding: 9px 0;
    border-bottom: 1px solid var(--line);
    transition: color 0.15s ease, padding-left 0.15s ease;
    overflow-wrap: anywhere;
    word-break: break-word;
  }

  .contact a:first-of-type { border-top: 1px solid var(--line); }

  .contact a:hover {
    color: var(--gold);
    padding-left: 6px;
  }

  .contact a span {
    display: block;
    color: var(--cyan);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.06em;
    margin-bottom: 3px;
  }

  .sidebar-foot {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.68rem;
    color: var(--muted);
    letter-spacing: 0.04em;
  }

  /* ---------- Projects ---------- */
  .projects {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
  }

  .project-grid {
    flex: 1;
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: 1fr 1fr;
    gap: 22px;
    padding: 32px;
  }

  .project-card {
    border: 2px solid var(--line);
    border-radius: 22px;
    padding: 36px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    position: relative;
    transition: border-color 0.2s ease, background 0.2s ease;
  }

  .project-card:hover {
    border-color: var(--gold);
    background: var(--panel);
  }

  .project-card.empty {
    border-style: dashed;
    align-items: center;
    justify-content: center;
    color: var(--muted);
  }

  .project-card.empty:hover {
    border-color: var(--line);
    background: none;
  }

  .project-card.empty .empty-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.72rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .project-index {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.7rem;
    color: var(--gold);
    letter-spacing: 0.08em;
    margin-bottom: 14px;
  }

  .project-title {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 500;
    font-size: 1.4rem;
    line-height: 1.2;
  }

  .project-desc {
    margin-top: 12px;
    color: var(--muted);
    font-size: 0.85rem;
    line-height: 1.55;
  }

  .tags {
    margin-top: 18px;
    display: flex;
    gap: 10px;
  }

  .tag {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.06em;
    color: var(--cyan);
    border: 1px solid var(--line);
    padding: 5px 10px;
    text-transform: uppercase;
  }

  /* ---------- Page nav ---------- */
  .project-nav {
    flex-shrink: 0;
    height: 31.5px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 22px;
  }

  .nav-arrow {
    width: 42px;
    height: 42px;
    border-radius: 50%;
    border: 1px solid var(--line);
    background: none;
    color: var(--text);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 1.19rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: border-color 0.15s ease, color 0.15s ease;
  }

  .nav-arrow:hover:not(:disabled) {
    border-color: var(--gold);
    color: var(--gold);
  }

  .nav-arrow:disabled {
    opacity: 0.25;
    cursor: default;
  }

  .page-indicator {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.72rem;
    color: var(--muted);
    letter-spacing: 0.08em;
    min-width: 56px;
    text-align: center;
  }

  /* ---------- Ticker ---------- */
  .ticker-bar {
    height: 26px;
    flex-shrink: 0;
    display: flex;
    align-items: stretch;
    border-top: 1px solid var(--line);
    background: var(--panel);
    overflow: hidden;
  }

  .ticker-label {
    flex-shrink: 0;
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 0 14px;
    background: var(--gold);
    opacity: 1;
    color: #000000;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.62rem;
    font-weight: 500;
    letter-spacing: 0.07em;
  }

  .ticker-label .dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: #000000;
    animation: blink 1.6s infinite ease-in-out;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.25; }
  }

  .ticker-viewport {
    flex: 1;
    overflow: hidden;
    position: relative;
  }

  .ticker-track {
    display: flex;
    width: max-content;
    height: 100%;
    align-items: center;
    animation: scroll-left 38s linear infinite;
  }

  @keyframes scroll-left {
    from { transform: translateX(0); }
    to   { transform: translateX(-50%); }
  }

  .ticker-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 0 18px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.68rem;
    white-space: nowrap;
    border-right: 1px solid var(--line);
  }

  .ticker-item .sym { color: var(--muted); }
  .ticker-item .px { color: var(--text); font-weight: 500; }
  .ticker-item .chg.up { color: var(--up); }
  .ticker-item .chg.down { color: var(--down); }

  @media (prefers-reduced-motion: reduce) {
    .ticker-track { animation: none; }
    .ticker-label .dot { animation: none; }
  }

  body {
    overflow-x: auto;
  }
</style>
</head>

<script>
  const data = [
    { sym: 'GOLD',   px: '2,324.40',  chg: '+0.45%', dir: 'up' },
    { sym: 'ETH',    px: '3,304.55',  chg: '-1.12%', dir: 'down' },
    { sym: 'US10Y',  px: '4.403%',    chg: '+0.024', dir: 'up' },
    { sym: 'USD/JPY',px: '151.34',    chg: '+0.02%', dir: 'up' },
    { sym: 'SPX',    px: '5,204.34',  chg: '+0.85%', dir: 'up' },
    { sym: 'NDAQ',   px: '16,274.95', chg: '+1.12%', dir: 'up' },
    { sym: 'BTC',    px: '67,402.10', chg: '+2.15%', dir: 'up' },
  ];

  function buildItems() {
    return data.map(d => `
      <div class="ticker-item">
        <span class="sym">${d.sym}</span>
        <span class="px">${d.px}</span>
        <span class="chg ${d.dir}">${d.chg}</span>
      </div>
    `).join('');
  }

  // duplicate the set so the loop is seamless
  const track = document.getElementById('tickerTrack');
  track.innerHTML = buildItems() + buildItems();

  // ---------- Projects grid + pagination ----------
  const projects = [
    {
      index: '01 — FINANCIAL MODELING',
      title: '3-Statement Model of Alibaba',
      desc: 'Integrated income statement, balance sheet, and cash flow model with linked revenue drivers and valuation outputs.',
      tags: ['Excel', 'DCF'],
    },
    {
      index: '02 — RISK ANALYSIS',
      title: 'Monte Carlo Simulation of Downside Risk',
      desc: 'Simulated thousands of return paths to estimate value-at-risk and tail-loss probability for a sample portfolio.',
      tags: ['Python', 'Risk'],
    },
    {
      index: '03 — PROJECT 3',
      title: 'Project 3',
      desc: 'Built a screening model to rank a basket of equities by relative value using a blended set of fundamental factors.',
      tags: ['Python', 'Equities'],
    },
    {
      index: '04 — PROJECT 4',
      title: 'Project 4',
      desc: 'Backtested a simple moving-average crossover strategy against five years of daily price data to gauge drawdown risk.',
      tags: ['R', 'Backtesting'],
    },
    {
      index: '05 — PROJECT 5',
      title: 'Project 5',
      desc: 'Modeled the term structure of interest rates and estimated forward rates using a bootstrapped yield curve.',
      tags: ['Excel', 'Fixed Income'],
    },
    {
      index: '06 — PROJECT 6',
      title: 'Project 6',
      desc: 'Designed a dashboard to track portfolio exposure by sector and flag concentration risk in real time.',
      tags: ['SQL', 'Dashboards'],
    },
  ];

  const PER_PAGE = 4;
  let page = 0;
  const totalPages = Math.max(1, Math.ceil(projects.length / PER_PAGE));

  const grid = document.getElementById('projectGrid');
  const pageIndicator = document.getElementById('pageIndicator');
  const prevBtn = document.getElementById('prevPage');
  const nextBtn = document.getElementById('nextPage');

  function pad(n) { return String(n).padStart(2, '0'); }

  function renderPage() {
    const start = page * PER_PAGE;
    const slice = projects.slice(start, start + PER_PAGE);
    const cells = [];

    for (let i = 0; i < PER_PAGE; i++) {
      const p = slice[i];
      if (p) {
        cells.push(`
          <article class="project-card">
            <div class="project-index">${p.index}</div>
            <h2 class="project-title">${p.title}</h2>
            <p class="project-desc">${p.desc}</p>
            <div class="tags">
              ${p.tags.map(t => `<span class="tag">${t}</span>`).join('')}
            </div>
          </article>
        `);
      } else {
        cells.push(`
          <article class="project-card empty">
            <span class="empty-label">— Open Slot —</span>
          </article>
        `);
      }
    }

    grid.innerHTML = cells.join('');
    pageIndicator.textContent = `${pad(page + 1)} / ${pad(totalPages)}`;
    prevBtn.disabled = page === 0;
    nextBtn.disabled = page >= totalPages - 1;
  }

  prevBtn.addEventListener('click', () => {
    if (page > 0) { page--; renderPage(); }
  });

  nextBtn.addEventListener('click', () => {
    if (page < totalPages - 1) { page++; renderPage(); }
  });

  renderPage();
</script>
